# The full stack: ClickHouse plus the tickstore app streaming three venues.
#
#   docker compose up -d --build   # run everything
#   curl localhost:9090/metrics    # app metrics
#   docker compose up -d clickhouse  # just the database (for local `go run`/tests)
#
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "9000:9000" # native protocol (used by the app)
      - "8123:8123" # http (handy for curl/clickhouse-client)
    environment:
      # Without explicit credentials the image locks the default user to
      # localhost only, so give the app a real network user. Dev creds only.
      CLICKHOUSE_USER: tickstore
      CLICKHOUSE_PASSWORD: tickstore
      CLICKHOUSE_DB: tickstore
    volumes:
      # Run our schema on first startup; CREATE ... IF NOT EXISTS is idempotent.
      - ./internal/sink/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 3s
      timeout: 2s
      retries: 20

  tickstore:
    build: .
    depends_on:
      clickhouse:
        condition: service_healthy # wait for the DB before connecting
    volumes:
      - ./config.docker.yaml:/etc/tickstore/config.yaml:ro
    ports:
      - "9090:9090" # Prometheus /metrics
    restart: unless-stopped
